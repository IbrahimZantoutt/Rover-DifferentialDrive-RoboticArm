# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - j1_waist
      - j2_shoulder
      - j3_elbow
      - j4_wrist
      - j5_wrist
      - j6_wrist
    command_interfaces:
      - position
    state_interfaces:
      - position
gripper_controller:
  ros__parameters:
    joints:
      - gripperfinger_left_joint
      - gripperfinger_right_joint
    command_interfaces:
      - position
    state_interfaces:
      - position