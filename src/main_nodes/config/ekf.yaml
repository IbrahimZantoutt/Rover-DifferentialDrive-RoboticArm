ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    two_d_mode: true            # planar robot: zero out z/roll/pitch
    publish_tf: true
    odom_frame: odom
    base_link_frame: robot_base
    world_frame: odom           # this EKF publishes odom -> robot_base

    odom0: /odom                # WHEELS: trust ONLY forward velocity vX
    odom0_config: [false,false,false, false,false,false, true,false,false,
                   false,false,false, false,false,false]

    imu0: /imu                  # IMU: trust yaw + yaw-rate (the good heading)
    imu0_config: [false,false,false, false,false,true, false,false,false,
                  false,false,true, false,false,false]
    imu0_differential: false
